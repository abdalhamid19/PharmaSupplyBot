site:
  base_url: "https://seller.tawreed.io/#/login"

# Excel mapping for your file:
# Columns found:
# ["كود","إسم الصنف","كمية النقص", ... "رصيد الوردانى"]
excel:
  code_col: "كود"
  name_col: "إسم الصنف"
  qty_col: "كمية النقص"
  # If you want to compute qty differently, keep qty_col and use `min_qty`/`max_qty`.
  min_qty: 1
  max_qty: 999999

# One or more pharmacy profiles.
# Each profile gets its own saved browser session in state/<profile>.json
profiles:
  wardany:
    display_name: "صيدلية الورداني"
    # If the site has a pharmacy selector after login, set it here (optional).
    pharmacy_switch:
      enabled: false
      pharmacy_name: ""

# UI selectors (update these if the site DOM differs).
# Strategy: keep selectors flexible and editable without changing code.
selectors:
  login:
    email_input: "input[type='email'], input[name='email']"
    password_input: "input[type='password'], input[name='password']"
    submit_button: "button[type='submit']"

  nav:
    # A selector that indicates the app is logged-in and ready.
    logged_in_marker: "text=الرئيسية, text=Home, [data-testid='home']"

  order_flow:
    # These are placeholders; you'll likely need to adjust after we inspect the real UI.
    go_to_orders: "text=الطلبيات, text=Orders"
    new_order: "text=طلبية جديدة, text=New Order, button:has-text('New')"
    item_search_input: "input[placeholder*='بحث'], input[placeholder*='Search']"
    item_first_result: ".results >> :nth-match(*, 1)"
    qty_input: "input[type='number']"
    add_item_button: "text=إضافة, text=Add"
    confirm_order_button: "text=تأكيد, text=Confirm"

warehouse_strategy:
  # Options: "first_available" | "max_available" | "max_discount"
  mode: "first_available"
  selectors:
    warehouse_rows: ".warehouse-row, [data-testid='warehouse-row']"
    available_qty: ".available, [data-testid='available']"
    pick_button: "text=اختيار, text=Select"

matching:
  exact_match_accept: true
  high_overlap_threshold: 0.85
  medium_score_threshold: 12.0
  medium_overlap_threshold: 0.6
  numeric_score_threshold: 16.0
  numeric_overlap_threshold: 0.45

runtime:
  headless: true
  slow_mo_ms: 0
  timeout_ms: 45000
  submit_order: false
